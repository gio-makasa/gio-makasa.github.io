<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap' rel='stylesheet'>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="text/javascript" src="quotes.json"></script>
    <script src="games.js" defer></script>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="index.css">
    <title>Page</title>
</head>
<body ng-app="CV">
    <div class="frame">
        <div id="header">
            <h1>CV</h1>
            <ul id="nav-bar">
                <li class="navbartabs" id="home"><a href="#/!">Home</a></li>
                <li class="navbartabs" id="games"><a href="#!games">Games</a></li>
                <li class="navbartabs" id="projects"><a href="#!projects">Projects</a></li>
            </ul>
        </div>
        
        <main ng-view></main>
        
        <button onclick="topFunction()" id="topbutton" class="glow" title="Go to top">&#8593</button>
        <div id="footer">
            <hr>
            <div class="social">
                <a href="https://github.com/gio-makasa" target="_blank" rel="noopener noreferrer">
                    <img src="pictures/github.jpg" alt="github" title="Github">
                </a>
            </div>
        </div>
    </div>
</body>
<script>
    var app = angular.module("CV", ["ngRoute"]);
    app.config(function($routeProvider) {
        $routeProvider
        .when("/", {
            templateUrl : "home.html"
        })
        .when("/games", {
            templateUrl : "games.html"
        })
        .when("/projects", {
            templateUrl : "projects.html"
        });
    });
</script>
</html>
