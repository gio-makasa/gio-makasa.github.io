<html lang="en">

                        </a>
                    </div>
                </div>
            </div>
            <div class="game_frame">
                <div class="games">

                        <h2>Flip a coin</h2>

                </div>

                <div class="games">
                    <div class="front">
                        <h2>ფორტუნა</h2>
                    </div>
                    <div class="back">
                        <a href="games/fortuna.html">
                            <img src="pictures/fortuna.PNG" alt="fortuna">

                </div>

            <div class="game_frame">
                <div class="games">

                        <h2>BLACKJACK</h2>

                    <div class="back">
                        <a href="games/blackjack.html">
                            <img src="pictures/blackjack.PNG" alt="BLACKJACK">
                        </a>
                    </div>
                </div>
            </div>
            <div class="game_frame">
                <div class="games">
                    <div class="front">
                        <h2>RACE</h2>
                    </div>
                    <div class="back">
                        <a href="games/race.html">

            <div class="game_frame">
                <div class="games">

                    </div>
                    <div class="back">
                        <a href="games/sonic.html">
                            <img src="pictures/sonic.png" alt="Sonic">
                        </a>
                    </div>
                </div>
            </div>
        </main>
        <div id="footer" ng-include="'footer.html'"></div>
        <button onclick="topFunction()" id="topbutton" class="glow" title="Go to top">&#8593</button>
    </div>
</body>
<script>
    /*tab color
    var tabs = document.getElementsByClassName("navbartabs");
    for(x of tabs){
        x.style.backgroundColor = "transparent";
    }
    document.getElementById("games").style.backgroundColor = "blueviolet";
    */

    /*scroll button*/
    var mybutton = document.getElementById("topbutton");
    window.onscroll = function() {scrollFunction()};

    function scrollFunction(){
        if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20){
            mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
    }
    function topFunction(){
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
    }

    /*quotes*/
    var mydata = JSON.parse(quote);
    var R = Math.floor(Math.random()*mydata.length);
    document.getElementById("q").innerHTML = `"${mydata[R].q}"`;
    document.getElementById("a").innerHTML = `- ${mydata[R].a}`;
</script>
</html>
