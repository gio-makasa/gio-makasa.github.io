<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="flip-coin.css">
    <title>flip a coin</title>
</head>
<body>
    <div class="container">
        <p class="top">3-მდეა</p>
        <div class="coin" id="coin">
            <div class="heads">
                <img src="head.png" alt="head">
            </div>
         
            <div class="tails">
               <img src="tail.gif" alt="tail">
            </div>
        </div>
        <div class="stats">
            <p id="ME">YOU: 0</p>
            <p id="PC">PC: 0</p>
        </div>
        <div class="buttons">
            <button id="flip-tail">Tail</button>
            <button id="reset-button">Reset</button>
            <button id="flip-head">Head</button>
        </div>
    </div>
</body>
<script>
    let coin = document.querySelector(".coin");
let flip_tail = document.querySelector("#flip-tail");
let flip_head = document.querySelector("#flip-head");
let resetBtn = document.querySelector("#reset-button");
let me = 0;
let pc = 0;
let texti = '';
let feri = '';
//TAIL
flip_tail.addEventListener("click", () => {
let i = Math.floor(Math.random() * 2);
coin.style.animation = "none";
if(i){
    setTimeout(function(){
        coin.style.animation = "spin-heads 3s forwards";
    }, 100);
    pc++;
    texti = 'სამწუხაროდ წააგე';
    feri = 'red';
}
else{
    setTimeout(function(){
        coin.style.animation = "spin-tails 3s forwards";
    }, 100);
    me++;
    texti = 'გილოცავ!!!';
    feri = 'green';
}
setTimeout(updateStats, 3000);
disableButton();
document.querySelector("p").textContent = '3-მდეა';
document.querySelector("p").style.color = 'black';
});
//HEAD
flip_head.addEventListener("click", () => {
let i = Math.floor(Math.random() * 2);
coin.style.animation = "none";
if(i){
    setTimeout(function(){
        coin.style.animation = "spin-heads 3s forwards";
    }, 100);
    me++;
    texti = 'გილოცავ!!!';
    feri = 'green';
}
else{
    setTimeout(function(){
        coin.style.animation = "spin-tails 3s forwards";
    }, 100);
    pc++;
    texti = 'სამწუხაროდ წააგე';
    feri = 'red';
}
setTimeout(updateStats, 3000);
disableButton();
document.querySelector("p").textContent = '3-მდეა';
document.querySelector("p").style.color = 'black';
});

function updateStats(){
document.querySelector("#ME").textContent = `YOU: ${me}`;
document.querySelector("#PC").textContent = `PC: ${pc}`;
if(me == 3){
document.querySelector("p").textContent = 'გაიმარჯვე!!!';
document.querySelector("p").style.color = 'gold';
disableButton();
} else if(pc == 3){
document.querySelector("p").textContent = 'დამარცხდი';
document.querySelector("p").style.color = feri;
disableButton();
}else {
document.querySelector("p").textContent = texti;
document.querySelector("p").style.color = feri;
}
}
function disableButton(){
if(me == 3 || pc == 3){
    flip_tail.disabled = true;
    flip_head.disabled = true;
} else {
flip_tail.disabled = true;
flip_head.disabled = true;
setTimeout(function(){
    flip_tail.disabled = false;
    flip_head.disabled = false;
},3000);
}
}
resetBtn.addEventListener("click",() => {
coin.style.animation = "none";
flip_tail.disabled = false;
flip_head.disabled = false;
me = 0;
pc = 0;
texti = '3-მდეა';
feri = 'black';
updateStats();
});
</script>
</html>
