<!DOCTYPE html>
<html>
    <head>
        <title>კამათელი</title>
    </head>
    <style>
        body{
            background-color: rgb(0, 71, 27);
        }
        .frame{
            display: block;
            text-align: center;
            background-color: white;
            border-radius: 10px;
            width: 500px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        .top{
            display: block;
            width: 100%;
            padding: 10px;
        }
        .top > span{
            display: block;
            width: 50%;
            float: left;
        }
        #reset{
            background-color: rgb(0, 156, 21);
            color: white;
            border: none;
            border-radius: 0 0 10px 10px;
            font-size: 20px;
            font-weight: bolder;
            display: block;
            width: 100%;
            height: 50px;
        }
        #reset:hover{
            background-color: rgb(0, 117, 16);
        }
    </style>
    <body>
        <div class="frame">
            <div class="top">
                <span>YOU</span>
                <span>PC</span>
            </div>
            <div>
                <img src="Dice3d/.png">
                <span id="NameDice" style="font-weight: bold; font-size: 30px;"></span>
                <img src="Dice3d/.png">
                <p id="Sedegi" style="font-weight: bold; font-size: 30px; text-align: center;"></p>
            </div>
            <div>
                <button id="reset" onclick="reset()">ხელახლა ცდა</button>
            </div>
        </div>
    </body>
    <script>
        function dice_urlImg_Name(URL_img,Name,Twins)
        {
            this.URL_img = URL_img;
            this.Name    = Name;
            this.Twins   = Twins;
        }
        var DiceObject = [];

        DiceObject[0] = new dice_urlImg_Name("dice-3d-i.png", "იაქე", "იაგანი");
        DiceObject[1] = new dice_urlImg_Name("dice-3d-ii.png", "დუ", "დუბარა");
        DiceObject[2] = new dice_urlImg_Name("dice-3d-iii.png", "სე", "დუსე");
        DiceObject[3] = new dice_urlImg_Name("dice-3d-iv.png", "ჩარი", "დორჩარი");
        DiceObject[4] = new dice_urlImg_Name("dice-3d-v.png", "ფანჯი", "დუბეში");
        DiceObject[5] = new dice_urlImg_Name("dice-3d-vi.png", "შაში", "დუშაში");
        
        var me_qula = 0;
        var pc_qula = 0;

        var R_me = Math.floor(6 * Math.random());
        var R_pc = Math.floor(6 * Math.random());

        document.images[0].src = "Dice3d/" + DiceObject[R_me].URL_img;

        var Max = Math.max(R_me,R_pc);
        var Min = Math.min(R_me,R_pc);

        if(Max != Min)
        {
            if(Max == 4 && Min == 3)
            document.getElementById("NameDice").innerHTML = "ბეშ ოთხი";
            else
            if(Max == 2 && Min == 1)
            document.getElementById("NameDice").innerHTML = "სევაი დუ";
            else
            if(Max == 5 && Min == 4)
            document.getElementById("NameDice").innerHTML = "შაში ბეში";
            else
            if(true)
            {
                document.getElementById("NameDice").innerHTML = DiceObject[Max].Name + " " + DiceObject[Min].Name;
            }
        }
        else
        {
            document.getElementById("NameDice").innerHTML = DiceObject[Max].Twins;
        }
        document.images[1].src = "Dice3d/" + DiceObject[R_pc].URL_img;

        if(R_me > R_pc)
        {
            document.getElementById("Sedegi").innerHTML = "მოიგეთ";
        }
        else
        {
            document.getElementById("Sedegi").innerHTML = "წააგეთ";
        }
        function reset(){
            location.reload();
        }
    </script>
</html>
